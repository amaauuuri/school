name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          cd "Programacion II/Proyecto Final"
          npm install

      - name: Build Angular App
        run: |
          cd "Programacion II/Proyecto Final"
          npx ng build --configuration production --base-href=/school/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: "Programacion II/Proyecto Final/dist/papeleria-proyecto/browser"
          branch: gh-pages
