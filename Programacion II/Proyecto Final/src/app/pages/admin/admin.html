<div class="p-4">

    <h2 class="mb-4">
        Administración
    </h2>

    <div class="card p-4 shadow-sm">

        <div class="mb-3">

            <label class="form-label">
                Nombre del producto
            </label>

            <input
                type="text"
                class="form-control"
                placeholder="Ejemplo: Cuaderno"
                [(ngModel)]="nombre"
            >

        </div>

        <div class="mb-3">

            <label class="form-label">
                Precio
            </label>

            <input
                type="number"
                class="form-control"
                placeholder="Ejemplo: 80"
                [(ngModel)]="precio"
            >

        </div>

        <div class="mb-3">

            <label class="form-label">
                Stock
            </label>

            <input
                type="number"
                class="form-control"
                placeholder="Ejemplo: 20"
                [(ngModel)]="stock"
            >

        </div>

<button
    class="btn btn-dark"
    (click)="agregarProducto()"
>
    Agregar producto
</button>

    </div>

</div>
